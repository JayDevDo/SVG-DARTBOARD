<!DOCTYPE html>
<html lang = "en">
	<head>
		<meta charset = "utf-8">
		<meta name = "viewport" content = "width=device-width, initial-scale=1.0">
		<title>DFC 1.0.3</title>
		<!-- Version 1.0.3 2026-06-05 17h00 -->
		<link rel = "stylesheet" type = "text/css" href = "DFC.css">
		<script src = "appState.js" defer></script>
		<script src = "checkoutEngine.js" defer></script>
		<script src = "svgDartBoard.js" defer></script>
		<script src = "UI.js" defer></script>
	</head>

	<body id = "pageBody">
		<main class = "pageWrapper">
			<section class = "controlPanel" aria-label = "Score controls">
				<table class = "numPadTable" id = "numPad">
					<thead>
						<tr>
							<th class = "scoreCell" colspan = "3">
								<span class = "scoreFont" id = "scoreDisplay">000</span>
							</th>
						</tr>
					</thead>

					<tbody>
						<tr>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "7">7</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "8">8</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "9">9</button></td>
						</tr>

						<tr>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "4">4</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "5">5</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "6">6</button></td>
						</tr>

						<tr>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "1">1</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "2">2</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "3">3</button></td>
						</tr>

						<tr>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "delete">&#9003;</button></td>
							<td><button class = "numPadButton" type = "button" data-numpad-value = "0">0</button></td>
							<td><button class = "numPadButton" type = "button" id = "btnScoreOk">OK</button></td>
						</tr>

						<tr>
							<td colspan = "3">
								<button class = "wideButton" type = "button" id = "btnResetBoards">Reset dartboards</button>
							</td>
						</tr>

						<tr>
							<td colspan = "3">
								<button class = "wideButton dihButton" type = "button" id = "btnDih3" data-dih = "3">3 DIH</button>
							</td>
						</tr>

						<tr>
							<td colspan = "3">
								<button class = "wideButton dihButton" type = "button" id = "btnDih2" data-dih = "2">2 DIH</button>
							</td>
						</tr>

						<tr>
							<td colspan = "3">
								<button class = "wideButton dihButton" type = "button" id = "btnDih1" data-dih = "1">1 DIH</button>
							</td>
						</tr>

						<tr>
							<td colspan = "3">
								<div class = "finalScoreBox">
									<span>Final</span>
									<span class = "scoreFont" id = "scoreFinal">0</span>
								</div>
							</td>
						</tr>

						<tr>
							<th colspan = "3">Fav Double</th>
						</tr>

						<tr>
							<td id = "favD1">D20</td>
							<td id = "favD2">D16</td>
							<td id = "favD3">D18</td>
						</tr>

						<tr>
							<th colspan = "3">Fav Treble</th>
						</tr>

						<tr>
							<td id = "favT1">T20</td>
							<td id = "favT2">T19</td>
							<td id = "favT3">T18</td>
						</tr>
					</tbody>
				</table>
			</section>

			<section class = "boardsPanel" aria-label = "Dartboards">
				<article class = "dartBoardCard" id = "dartCard1" data-dart-index = "0">
					<header class = "dartBoardHeader">
						<h2>Dart 1</h2>
						<div class = "scoreBeforeBox">
							<span>Before</span>
							<span class = "scoreFont" id = "scoreBeforeDart1">0</span>
						</div>
					</header>

					<div class = "dartBoardTarget" id = "dartBoard1" aria-label = "Dartboard for dart 1"></div>

					<div class = "dartResultLine">
						<span class = "segmentLabel" id = "segmentDart1">DNT</span>
						<span class = "segmentValue" id = "valueDart1">0</span>
						<span class = "scoreAfter" id = "scoreAfterDart1"></span>
					</div>

					<div class = "finishTableWrapper" id = "finishTableDart1"></div>
				</article>

				<article class = "dartBoardCard" id = "dartCard2" data-dart-index = "1">
					<header class = "dartBoardHeader">
						<h2>Dart 2</h2>
						<div class = "scoreBeforeBox">
							<span>Before</span>
							<span class = "scoreFont" id = "scoreBeforeDart2">0</span>
						</div>
					</header>

					<div class = "dartBoardTarget" id = "dartBoard2" aria-label = "Dartboard for dart 2"></div>

					<div class = "dartResultLine">
						<span class = "segmentLabel" id = "segmentDart2">DNT</span>
						<span class = "segmentValue" id = "valueDart2">0</span>
						<span class = "scoreAfter" id = "scoreAfterDart2"></span>
					</div>

					<div class = "finishTableWrapper" id = "finishTableDart2"></div>
				</article>

				<article class = "dartBoardCard" id = "dartCard3" data-dart-index = "2">
					<header class = "dartBoardHeader">
						<h2>Dart 3</h2>
						<div class = "scoreBeforeBox">
							<span>Before</span>
							<span class = "scoreFont" id = "scoreBeforeDart3">0</span>
						</div>
					</header>

					<div class = "dartBoardTarget" id = "dartBoard3" aria-label = "Dartboard for dart 3"></div>

					<div class = "dartResultLine">
						<span class = "segmentLabel" id = "segmentDart3">DNT</span>
						<span class = "segmentValue" id = "valueDart3">0</span>
						<span class = "scoreAfter" id = "scoreAfterDart3"></span>
					</div>

					<div class = "finishTableWrapper" id = "finishTableDart3"></div>
				</article>
			</section>

			<section class = "messagePanel" id = "messagePanel" aria-label = "Messages"></section>
		</main>
	</body>
</html>
